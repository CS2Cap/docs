<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-label="Sell-side depth curve from zero to eighteen points">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d6ef3"/>
      <stop offset="100%" stop-color="#22b8f0"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d6ef3" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1d6ef3" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- grid -->
  <line x1="52" y1="20" x2="52" y2="148" stroke="#94a3b8" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="52" y1="148" x2="464" y2="148" stroke="#94a3b8" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="52" y1="84" x2="464" y2="84" stroke="#94a3b8" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- y labels -->
  <text x="46" y="24" fill="#94a3b8" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="end">18 pts</text>
  <text x="46" y="152" fill="#94a3b8" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="end">0</text>

  <!-- area fill under curve -->
  <path d="M 52,148 L 53.6,125.4 L 56.1,111.1 L 60.2,98.5 L 66.8,87.7 L 76.7,79.5 L 93.2,67.0 L 118.0,56.3 L 151.0,46.3 L 200.7,36.9 L 266.5,29.1 L 350.5,23.2 L 464,20 L 464,148 Z" fill="url(#fill)"/>

  <!-- curve -->
  <polyline points="52,148 53.6,125.4 56.1,111.1 60.2,98.5 66.8,87.7 76.7,79.5 93.2,67.0 118.0,56.3 151.0,46.3 200.7,36.9 266.5,29.1 350.5,23.2 464,20" fill="none" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- points -->
  <circle cx="52" cy="148" r="5" fill="#1d6ef3" stroke="#ffffff" stroke-opacity="0.9" stroke-width="2"/>
  <circle cx="68.5" cy="85.4" r="5" fill="#1d6ef3" stroke="#ffffff" stroke-opacity="0.9" stroke-width="2"/>
  <circle cx="464" cy="20" r="5" fill="#22b8f0" stroke="#ffffff" stroke-opacity="0.9" stroke-width="2"/>

  <!-- x labels -->
  <text x="52" y="172" fill="#94a3b8" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="start">0 listings</text>
  <text x="60" y="50" fill="#cbd5e1" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="start">20 listings</text>
  <text x="464" y="172" fill="#94a3b8" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="end">500 listings</text>
</svg>
