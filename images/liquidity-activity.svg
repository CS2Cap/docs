<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-label="Recent activity curve from zero to forty five points">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d6ef3"/>
      <stop offset="100%" stop-color="#22b8f0"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d6ef3" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1d6ef3" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- grid -->
  <line x1="52" y1="20" x2="52" y2="148" stroke="#94a3b8" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="52" y1="148" x2="464" y2="148" stroke="#94a3b8" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="52" y1="74.5" x2="464" y2="74.5" stroke="#94a3b8" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- y labels -->
  <text x="46" y="24" fill="#94a3b8" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="end">45 pts</text>
  <text x="46" y="152" fill="#94a3b8" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="end">0</text>

  <!-- area fill under curve -->
  <path d="M 52,148 L 54.1,131.3 L 56.1,121.5 L 60.2,109.2 L 68.5,95.0 L 80.8,82.7 L 97.4,72.4 L 124.1,61.6 L 165.3,50.9 L 226.9,40.5 L 309.5,31.3 L 400.2,23.9 L 464,20 L 464,148 Z" fill="url(#fill)"/>

  <!-- curve -->
  <polyline points="52,148 54.1,131.3 56.1,121.5 60.2,109.2 68.5,95.0 80.8,82.7 97.4,72.4 124.1,61.6 165.3,50.9 226.9,40.5 309.5,31.3 400.2,23.9 464,20" fill="none" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- points -->
  <circle cx="52" cy="148" r="5" fill="#1d6ef3" stroke="#ffffff" stroke-opacity="0.9" stroke-width="2"/>
  <circle cx="93.2" cy="74.5" r="5" fill="#1d6ef3" stroke="#ffffff" stroke-opacity="0.9" stroke-width="2"/>
  <circle cx="464" cy="20" r="5" fill="#22b8f0" stroke="#ffffff" stroke-opacity="0.9" stroke-width="2"/>

  <!-- x labels -->
  <text x="52" y="172" fill="#94a3b8" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="start">0 units</text>
  <text x="93.2" y="58" fill="#cbd5e1" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="middle">20 units</text>
  <text x="464" y="172" fill="#94a3b8" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="end">200 units</text>
</svg>
