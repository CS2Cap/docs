<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-label="Bid ask quality ramp from zero to twelve points">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d6ef3"/>
      <stop offset="100%" stop-color="#22b8f0"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d6ef3" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1d6ef3" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- grid -->
  <line x1="52" y1="20" x2="52" y2="148" stroke="#94a3b8" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="52" y1="148" x2="464" y2="148" stroke="#94a3b8" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="258" y1="20" x2="258" y2="148" stroke="#94a3b8" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="443" y1="20" x2="443" y2="148" stroke="#94a3b8" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- y labels -->
  <text x="46" y="24" fill="#94a3b8" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="end">12 pts</text>
  <text x="46" y="152" fill="#94a3b8" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="end">0</text>

  <!-- area fill under ramp -->
  <path d="M 52,148 L 258,148 L 443,20 L 464,20 L 464,148 Z" fill="url(#fill)"/>

  <!-- curve -->
  <polyline points="52,148 258,148 443,20 464,20" fill="none" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- points -->
  <circle cx="258" cy="148" r="5" fill="#1d6ef3" stroke="#ffffff" stroke-opacity="0.9" stroke-width="2"/>
  <circle cx="443" cy="20" r="5" fill="#22b8f0" stroke="#ffffff" stroke-opacity="0.9" stroke-width="2"/>

  <!-- x labels -->
  <text x="52" y="172" fill="#94a3b8" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="start">0%</text>
  <text x="258" y="172" fill="#cbd5e1" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="middle">50%</text>
  <text x="443" y="40" fill="#cbd5e1" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="middle">95%</text>
  <text x="464" y="172" fill="#94a3b8" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="end">100%</text>
</svg>
