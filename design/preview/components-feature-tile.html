<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1px; background:var(--line); border:2px solid var(--line);">
    <div style="background:var(--surface); padding:18px;">
      <div style="display:flex; align-items:start; justify-content:space-between; margin-bottom:14px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="1.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <span class="t-tag">LIVE</span>
      </div>
      <div class="t-label-sm" style="margin-bottom:8px;">REAL-TIME PRICES</div>
      <div style="font: 400 13px/1.5 var(--font-sans); color:var(--fg-muted);">Lowest ask and highest bid across every market, at a glance.</div>
    </div>
    <div style="background:var(--surface); padding:18px;">
      <div style="display:flex; align-items:start; justify-content:space-between; margin-bottom:14px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="1.5"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 6-6"/></svg>
        <span class="t-tag">365D+</span>
      </div>
      <div class="t-label-sm" style="margin-bottom:8px;">HISTORICAL DATA</div>
      <div style="font: 400 13px/1.5 var(--font-sans); color:var(--fg-muted);">A year+ of price history across every release and patch.</div>
    </div>
  </div>
  <div class="t-code" style="margin-top:8px;">feature tile: icon top-left · tag top-right · mono caps title · sentence body</div>
</body></html>
