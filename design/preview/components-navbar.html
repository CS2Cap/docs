<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:0;">
  <nav style="height:56px; background: hsl(220 20% 4% / .9); backdrop-filter: blur(6px); border-bottom: 2px solid var(--line); display:flex; align-items:center; padding: 0 32px; gap:24px;">
    <div style="display:flex; align-items:center; gap:8px;">
      <img src="../assets/logo.svg" style="width:28px; height:28px;">
      <span style="font: 700 18px var(--font-mono); letter-spacing:-0.02em;">CS2<span class="t-gradient">Cap</span></span>
    </div>
    <div style="display:flex; gap:4px; margin-left:8px;">
      <a style="padding:6px 12px; font: 600 13px var(--font-mono); letter-spacing:.12em; color: var(--brand);">SEARCH</a>
      <a style="padding:6px 12px; font: 600 13px var(--font-mono); letter-spacing:.12em; color: hsl(210 20% 90% / .9);">PRICING</a>
      <a style="padding:6px 12px; font: 600 13px var(--font-mono); letter-spacing:.12em; color: hsl(210 20% 90% / .9);">API</a>
      <a style="padding:6px 12px; font: 600 13px var(--font-mono); letter-spacing:.12em; color: hsl(210 20% 90% / .9);">DOCS</a>
    </div>
    <div style="margin-left:auto; display:flex; gap:12px; align-items:center;">
      <div style="position:relative;">
        <svg style="position:absolute; left:10px; top:50%; transform:translateY(-50%);" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="hsl(215 12% 50%)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input placeholder="Search items..." style="height:30px; width:180px; padding:0 12px 0 30px; background: hsl(220 15% 10% / .5); border:1px solid var(--line); color:var(--fg); font: 400 12px var(--font-mono); outline:none;">
      </div>
      <div style="width:34px; height:34px; border:2px solid var(--line); background: var(--surface-2); display:flex; align-items:center; justify-content:center; font: 700 11px var(--font-mono); color:var(--fg);">DG</div>
    </div>
  </nav>
</body></html>
