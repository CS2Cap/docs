<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:1px; background:var(--line); max-width:780px;">
    <div style="background:var(--surface); padding:22px 20px;">
      <div class="t-label-xs" style="margin-bottom:10px;">STARTER</div>
      <div style="display:flex; align-items:baseline; gap:4px;">
        <span style="font: 900 30px/1 var(--font-sans); color:var(--fg);">$0</span>
        <span class="t-code">/mo</span>
      </div>
      <div class="t-code" style="margin:4px 0 14px;">Always free</div>
      <div style="display:flex; flex-direction:column; gap:6px; margin-bottom:18px;">
        <div style="display:flex; gap:8px; align-items:center;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg><span class="t-code">Live prices · 39 markets</span></div>
        <div style="display:flex; gap:8px; align-items:center;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg><span class="t-code">60 req / min</span></div>
        <div style="display:flex; gap:8px; align-items:center;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg><span class="t-code">30d history</span></div>
      </div>
      <a style="display:block; text-align:center; padding:11px; border:2px solid var(--line); color:var(--fg); font: 700 11px var(--font-mono); letter-spacing:.14em; text-decoration:none;">GET STARTED</a>
    </div>
    <div style="background:var(--surface); padding:22px 20px; border:2px solid var(--brand); margin: -2px;">
      <div class="t-label-xs" style="margin-bottom:10px; color: var(--brand);">PRO · POPULAR</div>
      <div style="display:flex; align-items:baseline; gap:4px;">
        <span style="font: 900 30px/1 var(--font-sans); color:var(--fg);">$19</span>
        <span class="t-code">/mo</span>
      </div>
      <div class="t-code" style="margin:4px 0 14px;">Billed monthly</div>
      <div style="display:flex; flex-direction:column; gap:6px; margin-bottom:18px;">
        <div style="display:flex; gap:8px; align-items:center;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg><span class="t-code">Buy orders + sales</span></div>
        <div style="display:flex; gap:8px; align-items:center;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg><span class="t-code">600 req / min</span></div>
        <div style="display:flex; gap:8px; align-items:center;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg><span class="t-code">365d history</span></div>
      </div>
      <a style="display:block; text-align:center; padding:11px; background:var(--brand); border:2px solid var(--brand); color: hsl(220 20% 4%); font: 700 11px var(--font-mono); letter-spacing:.14em; text-decoration:none;">SUBSCRIBE</a>
    </div>
    <div style="background:var(--surface); padding:22px 20px;">
      <div class="t-label-xs" style="margin-bottom:10px;">QUANT</div>
      <div style="display:flex; align-items:baseline; gap:4px;">
        <span style="font: 900 30px/1 var(--font-sans); color:var(--fg);">$79</span>
        <span class="t-code">/mo</span>
      </div>
      <div class="t-code" style="margin:4px 0 14px;">Billed monthly</div>
      <div style="display:flex; flex-direction:column; gap:6px; margin-bottom:18px;">
        <div style="display:flex; gap:8px; align-items:center;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg><span class="t-code">Arbitrage signals</span></div>
        <div style="display:flex; gap:8px; align-items:center;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg><span class="t-code">3,000 req / min</span></div>
        <div style="display:flex; gap:8px; align-items:center;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg><span class="t-code">2y history · TA</span></div>
      </div>
      <a style="display:block; text-align:center; padding:11px; background:var(--brand); border:2px solid var(--brand); color: hsl(220 20% 4%); font: 700 11px var(--font-mono); letter-spacing:.14em; text-decoration:none;">SUBSCRIBE</a>
    </div>
  </div>
</body></html>
