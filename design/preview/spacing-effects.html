<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
@keyframes pg { 0%,100% { opacity:.4 } 50% { opacity:1 } }
.pg { animation: pg 2s ease-in-out infinite; }
</style>
</head>
<body>
  <div style="display:flex; flex-direction:column; gap:16px;">
    <div>
      <div class="t-label-xs" style="margin-bottom:8px;">GLOW · ambient hero halo</div>
      <div style="height:100px; display:flex; align-items:center; justify-content:center; background:var(--surface); border:2px solid var(--line); box-shadow: 0 0 20px hsl(217 90% 55% / .15), 0 0 60px hsl(217 90% 55% / .05);">
        <div style="font: 900 26px var(--font-sans); letter-spacing:-0.03em; color:var(--fg); text-shadow: 0 0 30px hsl(217 90% 55% / .5);">MARKET</div>
      </div>
      <div class="t-code" style="margin-top:6px;">.glow-blue (box-shadow) · .glow-text (text-shadow) · use sparingly</div>
    </div>
    <div>
      <div class="t-label-xs" style="margin-bottom:8px;">LIVE INDICATORS · pulse-glow 2s</div>
      <div style="display:flex; gap:16px; flex-wrap:wrap;">
        <span style="display:inline-flex; align-items:center; gap:8px;"><span class="pg" style="width:8px; height:8px; background:hsl(145 70% 45%);"></span><span class="t-label-xs" style="color: hsl(145 70% 45%);">39 MARKETS · LIVE</span></span>
        <span style="display:inline-flex; align-items:center; gap:8px;"><span class="pg" style="width:8px; height:8px; background:var(--brand);"></span><span class="t-label-xs" style="color: var(--brand);">DATA STREAMING</span></span>
        <span style="display:inline-flex; align-items:center; gap:8px;"><span class="pg" style="width:8px; height:8px; background:hsl(40 90% 55%);"></span><span class="t-label-xs" style="color: hsl(40 90% 55%);">RATE LIMIT 60%</span></span>
      </div>
    </div>
  </div>
</body></html>
