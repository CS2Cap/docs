<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="display:flex; flex-direction:column; gap:14px;">
  <div style="display:flex; align-items:center; gap:18px;">
    <img src="../assets/logo.svg" alt="" style="width:56px; height:56px;">
    <div>
      <div style="font:900 32px/1 var(--font-sans); letter-spacing:-0.03em; color: var(--fg);">CS2<span class="t-gradient">Cap</span></div>
      <div class="t-label-xs" style="margin-top:6px;">CS2 SKIN MARKET API · 39 MARKETPLACES</div>
    </div>
  </div>
  <div style="height:2px; background:var(--line);"></div>
  <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line);">
    <div style="background:var(--surface); padding:14px; display:flex; flex-direction:column; gap:8px;">
      <img src="../assets/starter-tier.png" alt="" style="width:48px; height:48px;">
      <div class="t-label-sm" style="color: hsl(155 85% 55%);">STARTER</div>
    </div>
    <div style="background:var(--surface); padding:14px; display:flex; flex-direction:column; gap:8px;">
      <img src="../assets/pro-tier.png" alt="" style="width:48px; height:48px;">
      <div class="t-label-sm" style="color: var(--brand);">PRO</div>
    </div>
    <div style="background:var(--surface); padding:14px; display:flex; flex-direction:column; gap:8px;">
      <img src="../assets/quant-tier.png" alt="" style="width:48px; height:48px;">
      <div class="t-label-sm" style="color: hsl(50 95% 60%);">QUANT</div>
    </div>
  </div>
</body></html>
