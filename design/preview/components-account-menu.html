<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:flex; gap:16px; align-items:flex-start;">
    <div style="width:34px; height:34px; border:2px solid var(--brand); background:var(--surface-2); display:flex; align-items:center; justify-content:center; font: 700 11px var(--font-mono); color:var(--fg);">DG</div>
    <div style="background:var(--popover); border:2px solid var(--line); width:240px;">
      <div style="padding:10px 12px;">
        <div style="font: 600 12px var(--font-mono); color:var(--fg);">Dadscap</div>
        <div style="font: 400 10px var(--font-mono); color:var(--fg-muted); margin-top:2px;">dad@cs2cap.com</div>
      </div>
      <div style="height:2px; background:var(--line);"></div>
      <a style="display:flex; align-items:center; gap:12px; padding:9px 12px; font: 400 11px var(--font-mono); letter-spacing:.12em; color:var(--brand); text-transform:uppercase; background: var(--surface-2);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a style="display:flex; align-items:center; gap:12px; padding:9px 12px; font: 400 11px var(--font-mono); letter-spacing:.12em; color:var(--fg); text-transform:uppercase;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="5" width="20" height="14" rx="0"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        Billing
      </a>
      <a style="display:flex; align-items:center; gap:12px; padding:9px 12px; font: 400 11px var(--font-mono); letter-spacing:.12em; color:var(--fg); text-transform:uppercase;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
        API Keys
      </a>
      <div style="height:2px; background:var(--line);"></div>
      <a style="display:flex; align-items:center; gap:12px; padding:9px 12px; font: 400 11px var(--font-mono); letter-spacing:.12em; color:hsl(0 70% 50%); text-transform:uppercase;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Log Out
      </a>
    </div>
  </div>
</body></html>
