<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:flex; flex-direction:column; gap:18px;">
    <div>
      <div class="t-label-xs" style="margin-bottom:8px;">SEARCH INPUT · navbar variant</div>
      <div style="position:relative; max-width:280px;">
        <svg style="position:absolute; left:10px; top:50%; transform:translateY(-50%);" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="hsl(215 12% 50%)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input placeholder="Search items..." style="width:100%; padding:9px 12px 9px 32px; background: hsl(220 15% 10% / .5); border:1px solid var(--line); color:var(--fg); font: 400 13px var(--font-mono); outline:none;">
      </div>
    </div>
    <div>
      <div class="t-label-xs" style="margin-bottom:8px;">TEXT FIELD · 2px border · :focus brand</div>
      <input value="AK-47 | Redline (Minimal Wear)" style="width:100%; max-width:380px; padding:12px 14px; background: var(--surface); border:2px solid var(--brand); color:var(--fg); font: 400 14px var(--font-mono); outline:none;">
    </div>
    <div>
      <div class="t-label-xs" style="margin-bottom:8px;">SEGMENTED · BILLING CYCLE</div>
      <div style="display:inline-flex; border:2px solid var(--line); background:var(--surface); padding:4px;">
        <button style="padding:8px 18px; background:var(--brand); color: hsl(220 20% 4%); border:none; font: 700 11px var(--font-mono); letter-spacing:.14em; cursor:pointer;">MONTHLY</button>
        <button style="padding:8px 18px; background:transparent; color: var(--fg-muted); border:none; font: 700 11px var(--font-mono); letter-spacing:.14em; cursor:pointer; display:inline-flex; align-items:center; gap:8px;">3 MONTHS <span style="background: hsl(145 70% 45% / .2); color: hsl(145 70% 45%); padding:2px 5px; font-size:9px; letter-spacing:.14em;">-16%</span></button>
      </div>
    </div>
  </div>
</body></html>
