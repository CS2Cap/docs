<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
@keyframes pg { 0%,100% { opacity:.4 } 50% { opacity:1 } }
.pg { animation: pg 2s ease-in-out infinite; }
@keyframes ticker { 0% { transform: translateX(0) } 100% { transform: translateX(-50%) } }
.tk { animation: ticker 30s linear infinite; display:inline-flex; }
</style>
</head>
<body style="padding:0; overflow:hidden;">
  <div style="border-top:2px solid var(--line); border-bottom:2px solid var(--line); background: hsl(220 15% 12% / .5); height: 44px; display:flex; align-items:center; overflow:hidden; width:100%;">
    <div class="tk" style="white-space:nowrap; padding:0 16px;">
      <div style="display:inline-flex; align-items:center; gap:14px;">
        <span style="display:inline-flex; align-items:center; gap:8px;">
          <span style="width:24px; height:24px; background: var(--surface-2); display:inline-block;"></span>
          <span class="t-code">AWP | Asiimov (FT)</span>
          <span class="t-code" style="color:var(--fg); font-weight:700;">$74.21</span>
          <span class="t-code" style="color:var(--brand); font-weight:700;">BUFF163</span>
        </span>
        <span class="t-code" style="color:var(--line);">│</span>
        <span style="display:inline-flex; align-items:center; gap:8px;">
          <span style="width:24px; height:24px; background: var(--surface-2); display:inline-block;"></span>
          <span class="t-code">AK-47 | Redline (MW)</span>
          <span class="t-code" style="color:var(--fg); font-weight:700;">$12.99</span>
          <span class="t-code" style="color:var(--brand); font-weight:700;">CSFLOAT</span>
        </span>
        <span class="t-code" style="color:var(--line);">│</span>
        <span style="display:inline-flex; align-items:center; gap:8px;">
          <span style="width:24px; height:24px; background: var(--surface-2); display:inline-block;"></span>
          <span class="t-code">★ Karambit | Doppler P2</span>
          <span class="t-code" style="color:var(--fg); font-weight:700;">$1,820.00</span>
          <span class="t-code" style="color:var(--brand); font-weight:700;">YOUPIN</span>
        </span>
        <span class="t-code" style="color:var(--line);">│</span>
      </div>
    </div>
  </div>
  <div class="t-code" style="padding:10px 20px;">LiveTicker · 30s linear loop · 2px borders top &amp; bottom · │ separators · clickable items</div>
</body></html>
