<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:24px; align-items:center;">
    <div>
      <div style="height:120px; background: linear-gradient(135deg, hsl(217 90% 55%), hsl(190 95% 50%)); border:2px solid var(--line);"></div>
      <div class="t-label-xs" style="margin-top:10px; color: var(--fg);">brand gradient · 135°</div>
      <div class="t-code" style="font-size:10px; margin-top:4px;">primary → accent · text-clip only</div>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1px; background:var(--line);">
      <div style="background:var(--bg); padding:12px;">
        <div style="height:60px; background: hsl(217 90% 55%);"></div>
        <div class="t-label-xs" style="margin-top:8px; color: var(--fg);">primary</div>
        <div class="t-code" style="font-size:10px;">217 90% 55%</div>
      </div>
      <div style="background:var(--bg); padding:12px;">
        <div style="height:60px; background: hsl(190 95% 50%);"></div>
        <div class="t-label-xs" style="margin-top:8px; color: var(--fg);">accent</div>
        <div class="t-code" style="font-size:10px;">190 95% 50%</div>
      </div>
      <div style="background:var(--bg); padding:12px;">
        <div style="height:60px; background: hsl(217 100% 60%);"></div>
        <div class="t-label-xs" style="margin-top:8px; color: var(--fg);">electric</div>
        <div class="t-code" style="font-size:10px;">217 100% 60%</div>
      </div>
      <div style="background:var(--bg); padding:12px;">
        <div style="height:60px; background: hsl(200 80% 55%);"></div>
        <div class="t-label-xs" style="margin-top:8px; color: var(--fg);">chart-2</div>
        <div class="t-code" style="font-size:10px;">200 80% 55%</div>
      </div>
    </div>
  </div>
</body></html>
