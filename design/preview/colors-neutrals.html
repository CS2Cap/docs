<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:grid; grid-template-columns: repeat(7, 1fr); gap:1px; background:var(--line); border:2px solid var(--line);">
    <div style="background:var(--bg); padding:12px;">
      <div style="height:54px; background: hsl(220 20% 4%); border:1px solid var(--line);"></div>
      <div class="t-label-xs" style="margin-top:8px; color: var(--fg);">background</div>
      <div class="t-code" style="font-size:10px;">220 20% 4%</div>
    </div>
    <div style="background:var(--bg); padding:12px;">
      <div style="height:54px; background: hsl(220 18% 7%); border:1px solid var(--line);"></div>
      <div class="t-label-xs" style="margin-top:8px; color: var(--fg);">card</div>
      <div class="t-code" style="font-size:10px;">220 18% 7%</div>
    </div>
    <div style="background:var(--bg); padding:12px;">
      <div style="height:54px; background: hsl(220 15% 10%); border:1px solid var(--line);"></div>
      <div class="t-label-xs" style="margin-top:8px; color: var(--fg);">muted</div>
      <div class="t-code" style="font-size:10px;">220 15% 10%</div>
    </div>
    <div style="background:var(--bg); padding:12px;">
      <div style="height:54px; background: hsl(220 15% 12%); border:1px solid var(--line);"></div>
      <div class="t-label-xs" style="margin-top:8px; color: var(--fg);">secondary</div>
      <div class="t-code" style="font-size:10px;">220 15% 12%</div>
    </div>
    <div style="background:var(--bg); padding:12px;">
      <div style="height:54px; background: hsl(217 40% 20%);"></div>
      <div class="t-label-xs" style="margin-top:8px; color: var(--fg);">border</div>
      <div class="t-code" style="font-size:10px;">217 40% 20%</div>
    </div>
    <div style="background:var(--bg); padding:12px;">
      <div style="height:54px; background: hsl(215 12% 50%);"></div>
      <div class="t-label-xs" style="margin-top:8px; color: var(--fg);">muted-fg</div>
      <div class="t-code" style="font-size:10px;">215 12% 50%</div>
    </div>
    <div style="background:var(--bg); padding:12px;">
      <div style="height:54px; background: hsl(210 20% 90%);"></div>
      <div class="t-label-xs" style="margin-top:8px; color: var(--fg);">foreground</div>
      <div class="t-code" style="font-size:10px;">210 20% 90%</div>
    </div>
  </div>
</body></html>
