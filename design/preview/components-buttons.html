<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:flex; flex-direction:column; gap:18px;">
    <div>
      <div class="t-label-xs" style="margin-bottom:10px;">PRIMARY · solid brand · arrow</div>
      <a href="#" style="display:inline-flex; align-items:center; gap:10px; padding:14px 28px; background:var(--brand); border:2px solid var(--brand); color: hsl(220 20% 4%); font: 700 13px var(--font-mono); letter-spacing:.12em; text-decoration:none;">
        SEE ENDPOINTS
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </a>
    </div>
    <div>
      <div class="t-label-xs" style="margin-bottom:10px;">SECONDARY · outlined</div>
      <a href="#" style="display:inline-flex; align-items:center; gap:10px; padding:14px 28px; border:2px solid var(--line); color:var(--fg); font: 700 13px var(--font-mono); letter-spacing:.12em; text-decoration:none;">
        VIEW DOCS
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
      </a>
    </div>
    <div>
      <div class="t-label-xs" style="margin-bottom:10px;">GHOST · brand outline · sign-in</div>
      <a href="#" style="display:inline-flex; padding:8px 18px; border:2px solid var(--brand); color: var(--brand); font: 700 11px var(--font-mono); letter-spacing:.14em; text-decoration:none;">
        SIGN IN
      </a>
    </div>
  </div>
</body></html>
