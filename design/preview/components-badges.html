<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:flex; flex-direction:column; gap:18px;">
    <div>
      <div class="t-label-xs" style="margin-bottom:10px;">CAPABILITY BADGES · marketplace cards</div>
      <div style="display:flex; gap:8px; align-items:center;">
        <span style="border:1px solid hsl(217 90% 55% / .3); color: var(--brand); padding:3px 8px; font: 700 9px var(--font-mono); letter-spacing:.14em;">L</span>
        <span style="border:1px solid hsl(200 80% 55% / .3); color: hsl(200 80% 55%); padding:3px 8px; font: 700 9px var(--font-mono); letter-spacing:.14em;">BO</span>
        <span style="border:1px solid hsl(145 70% 45% / .3); color: hsl(145 70% 45%); padding:3px 8px; font: 700 9px var(--font-mono); letter-spacing:.14em;">RS</span>
        <span class="t-code" style="margin-left:8px;">Listings · Buy Orders · Recent Sales</span>
      </div>
    </div>
    <div>
      <div class="t-label-xs" style="margin-bottom:10px;">STATUS PILLS</div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <span style="border:1px solid hsl(217 90% 55% / .4); color: var(--brand); padding:3px 10px; font: 700 10px var(--font-mono); letter-spacing:.14em;">FREE TIER — NO CARD</span>
        <span style="background: hsl(145 70% 45% / .12); color: hsl(145 70% 45%); padding:3px 10px; font: 700 10px var(--font-mono); letter-spacing:.14em;">+8.4% 30D</span>
        <span style="background: hsl(0 70% 50% / .12); color: hsl(0 70% 50%); padding:3px 10px; font: 700 10px var(--font-mono); letter-spacing:.14em;">−2.1% 24H</span>
        <span style="background: hsl(40 90% 55% / .15); color: hsl(40 90% 55%); padding:3px 10px; font: 700 10px var(--font-mono); letter-spacing:.14em;">RATE LIMIT 60%</span>
      </div>
    </div>
    <div>
      <div class="t-label-xs" style="margin-bottom:10px;">FEATURE TAGS</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <span class="t-tag">LIVE</span>
        <span class="t-tag">DATA</span>
        <span class="t-tag">CHARTS</span>
        <span class="t-tag">365D+</span>
        <span class="t-tag">TA</span>
      </div>
    </div>
  </div>
</body></html>
