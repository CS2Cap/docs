<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:flex; flex-direction:column; gap:18px;">
    <div>
      <div class="t-label-xs" style="margin-bottom:8px;">RADIUS — ALL ZERO. THE BRAND'S FIRST RULE.</div>
      <div style="display:flex; gap:10px; align-items:center;">
        <div style="width:56px; height:36px; background: var(--brand);"></div>
        <div style="width:56px; height:36px; border:2px solid var(--line); background:var(--surface);"></div>
        <div style="width:36px; height:36px; background: var(--brand); border-radius:50%;"></div>
        <div class="t-code">except: dots (LEDs) &amp; avatars · everything else is 0px</div>
      </div>
    </div>
    <div>
      <div class="t-label-xs" style="margin-bottom:8px;">BORDER WEIGHTS</div>
      <div style="display:flex; gap:12px;">
        <div style="padding:10px 14px; border:1px solid var(--line); background:var(--surface);" class="t-code">1px · inputs</div>
        <div style="padding:10px 14px; border:2px solid var(--line); background:var(--surface);" class="t-code">2px · STANDARD</div>
        <div style="padding:10px 14px; border:2px solid var(--brand); background:var(--surface); color:var(--brand);" class="t-code">2px · brand emphasis</div>
      </div>
    </div>
    <div>
      <div class="t-label-xs" style="margin-bottom:8px;">SPACING SCALE · px</div>
      <div style="display:flex; align-items:end; gap:6px;">
        <div style="height:1px; width:1px; background:var(--brand);"></div>
        <div style="height:4px; width:4px; background:var(--brand);"></div>
        <div style="height:8px; width:8px; background:var(--brand);"></div>
        <div style="height:12px; width:12px; background:var(--brand);"></div>
        <div style="height:16px; width:16px; background:var(--brand);"></div>
        <div style="height:24px; width:24px; background:var(--brand);"></div>
        <div style="height:32px; width:32px; background:var(--brand);"></div>
        <div style="height:48px; width:48px; background:var(--brand);"></div>
        <div style="height:64px; width:64px; background:var(--brand);"></div>
        <div style="height:96px; width:96px; background:var(--brand);"></div>
      </div>
      <div class="t-code" style="margin-top:6px;">1 · 4 · 8 · 12 · 16 · 24 · 32 · 48 · 64 · 96  ·  sections use 96 padding-block</div>
    </div>
  </div>
</body></html>
