<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:1px; background:var(--line); border:2px solid var(--line);">
    <div style="background:var(--bg); padding:14px;">
      <div style="height:64px; background: hsl(145 70% 45%);"></div>
      <div class="t-label-xs" style="margin-top:10px; color: var(--fg);">success</div>
      <div class="t-code" style="font-size:10px;">live · operational · +%</div>
    </div>
    <div style="background:var(--bg); padding:14px;">
      <div style="height:64px; background: hsl(40 90% 55%);"></div>
      <div class="t-label-xs" style="margin-top:10px; color: var(--fg);">warning</div>
      <div class="t-code" style="font-size:10px;">caution · idle</div>
    </div>
    <div style="background:var(--bg); padding:14px;">
      <div style="height:64px; background: hsl(0 70% 50%);"></div>
      <div class="t-label-xs" style="margin-top:10px; color: var(--fg);">destructive</div>
      <div class="t-code" style="font-size:10px;">error · log out · −%</div>
    </div>
    <div style="background:var(--bg); padding:14px;">
      <div style="height:64px; background: hsl(270 70% 60%);"></div>
      <div class="t-label-xs" style="margin-top:10px; color: var(--fg);">chart-3</div>
      <div class="t-code" style="font-size:10px;">analytics overlay</div>
    </div>
  </div>
</body></html>
