<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:1px; background:var(--line); border:2px solid var(--line);">
    <div style="background:var(--surface); padding:18px 16px;">
      <div class="t-num-lg">39</div>
      <div class="t-label-xs" style="margin-top:6px;">MARKETPLACES</div>
    </div>
    <div style="background:var(--surface); padding:18px 16px;">
      <div class="t-num-lg">9.2K</div>
      <div class="t-label-xs" style="margin-top:6px;">ITEMS TRACKED</div>
    </div>
    <div style="background:var(--surface); padding:18px 16px;">
      <div class="t-num-lg" style="font-style:normal;">Live</div>
      <div class="t-label-xs" style="margin-top:6px;">PRICES</div>
    </div>
    <div style="background:var(--surface); padding:18px 16px;">
      <div class="t-num-lg">365+</div>
      <div class="t-label-xs" style="margin-top:6px;">DAYS OF HISTORY</div>
    </div>
  </div>
  <div class="t-code" style="margin-top:10px;">.t-num-lg over .t-label-xs · stat-strip pattern · siblings in 1px hairline grid</div>
</body></html>
